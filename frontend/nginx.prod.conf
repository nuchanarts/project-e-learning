# Frontend nginx for the production (Caddy-fronted) stack.
# NOTE: /api is handled by Caddy BEFORE it ever reaches this nginx, so there is
# deliberately no /api proxy here — this server only serves the static SPA.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;

    # Hashed Vite assets — long-lived immutable cache.
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — every other path returns index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
