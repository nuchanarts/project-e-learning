name: bms-elearning-prod

services:
  # One-shot: create / sync the schema before the backend starts.
  # main has NO committed prisma migrations, so we use `db push` (sync schema.prisma
  # directly) instead of `migrate deploy`. Safe here because the DB is provisioned fresh.
  migrate:
    image: hub.hosxp.net/amon/bms-elearning-backend:${VERSION:-latest}
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    env_file: .env.prod
    command: ["sh", "-c", "npx prisma db push --skip-generate"]
    restart: "no"
    depends_on:
      mysql:
        condition: service_healthy
        required: false
    profiles: ["app-only", "full-stack"]

  backend:
    image: hub.hosxp.net/amon/bms-elearning-backend:${VERSION:-latest}
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: bms-elearning-backend
    restart: always
    env_file: .env.prod
    environment:
      NODE_ENV: production
      PORT: "3001"
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    profiles: ["app-only", "full-stack"]

  frontend:
    image: hub.hosxp.net/amon/bms-elearning-frontend:${VERSION:-latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: bms-elearning-frontend
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M
    profiles: ["app-only", "full-stack"]

  caddy:
    image: caddy:2-alpine
    container_name: bms-elearning-caddy
    restart: always
    environment:
      DOMAIN: ${DOMAIN:?set DOMAIN in .env.prod (e.g. elearning.example.com or :80 for plain http)}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    profiles: ["app-only", "full-stack"]

  mysql:
    image: mysql:8.4
    container_name: bms-elearning-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-bms_elearning}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: ${TZ:-Asia/Bangkok}
    # MySQL is exposed to the host only when MYSQL_HOST_BIND is set (e.g. a LAN IP
    # for admin tools). Leave it unset to keep the DB reachable only inside the
    # docker network.
    ports:
      - "${MYSQL_HOST_BIND:-127.0.0.1}:3306:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    profiles: ["full-stack"]

volumes:
  mysql_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local
